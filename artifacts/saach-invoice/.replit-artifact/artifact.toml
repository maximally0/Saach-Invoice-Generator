kind = "web"
previewPath = "/"
title = "SAACH Invoice Generator"
version = "1.0.0"
id = "artifacts/saach-invoice"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19337

[services.development]
run = "pnpm --filter @workspace/saach-invoice run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/saach-invoice", "run", "build" ]
publicDir = "artifacts/saach-invoice/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19337"
BASE_PATH = "/"
